<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Favorite Devotionals</title>
  <link rel="stylesheet" href="styles/styles.css" />
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="header-image">
        <h1>My Favorite<br>Devotionals</h1>
      </div>
    </header>
    <main>
      <div class="content-box">
        <!-- Add your devotional content here -->
         <table>
            <tr>
              <th>Speaker</th>
              <th>Title</th>
              <th>Location</th>
              <th>Year</th>
            </tr>
            <tr>
              <td>Kassandra M. Mackley</td>
              <td>The Transforming Power of Jesus Christ</td>
              <td>BYU-I Center</td>
              <td>2026</td>
            </tr>
            <tr>
              <td>Trent Shippen</td>
              <td>Become Legendary</td>
              <td>BYU-I Center</td>
              <td>2026</td>
            </tr>
            <tr>
              <td>Robert C. Gay</td>
              <td>Be True to the Voice of God</td>
              <td>BYU-I Center</td>
              <td>2026</td>
            </tr>
         </table>
      </div>
      <form>
        <label for="speaker">Speaker:</label><br>
        <input type="text" id="speaker" name="speaker"><br>
        <label for="title">Title:</label><br>
        <input type="text" id="title" name="title"><br>
        <label for="location">Location:</label><br>
        <input type="text" id="location" name="location"><br>
        <label for="year">Year:</label><br>
        <input type="text" id="year" name="year"><br>
      </form>
    </main>
  </div>
</body>
</html>
