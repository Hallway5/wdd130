<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apostles Spotlights</title>
    <style>
        /* Insert styles here */
        body {
            background: #E8ECED;
        }
        #spotlight {
            background-image: url("images/christus.webp");
            background-size: 150%;
            background-position-x: -200px;
            border: solid 4px;
            border-radius: 20px;
            border-color: #000;
            width: 800px;
            margin: 0 auto;
            text-align: center;
        }
        h1, h3 {
            color: #FFF;
            font-family: "Arial", sans-serif;
        }
        table {
            margin: 0 auto;
        }
        td {
            padding: 6px;
        }
        img {
            overflow: hidden;
            border: #fff 6px solid;
            border-radius: 50%;
        }
        #president {
            width: 120px;
            height: 120px;
        }
        #counselor {
            width: 100px;
            height: 100px;
        }
        #apostle {
            width: 80px;
            height: 80px;
        }
    </style>
</head>
<body>
    <!-- Insert HTML elements here -->
     <div id="spotlight">
        <h1>First Presidency</h1>
        <table>
            <tr>
                <td><img id="counselor" src="images/eyring.webp"></td>
                <td><img id="president" src="images/oaks.webp"></td>
                <td><img id="counselor" src="images/christofferson.webp"></td>
            </tr>
        </table>
        <h3>Quorum of the Twelve Apostles</h3>
        <table>
            <tr>
                <td><img id="apostle" src="images/uchtdorf.webp"></td>
                <td><img id="apostle" src="images/bednar.webp"></td>
                <td><img id="apostle" src="images/cook.webp"></td>
                <td><img id="apostle" src="images/anderson.webp"></td>
            </tr>
            <tr>
                <td><img id="apostle" src="images/rasband.webp"></td>
                <td><img id="apostle" src="images/stevenson.webp"></td>
                <td><img id="apostle" src="images/renlund.webp"></td>
                <td><img id="apostle" src="images/gong.webp"></td>
            </tr>
            <tr>
                <td><img id="apostle" src="images/soares.webp"></td>
                <td><img id="apostle" src="images/kearon.webp"></td>
                <td><img id="apostle" src="images/causse.webp"></td>
                <td><img id="apostle" src="images/gilbert.webp"></td>
            </tr>
        </table>
     </div>
</body>
</html>
